name: Rebase patched main onto upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/RaidTheory/arcraiders-data.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase main onto upstream
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push rebased main
        run: git push origin main --force-with-lease
